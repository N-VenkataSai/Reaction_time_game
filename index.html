<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaction Time Game</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:Arial, Helvetica, sans-serif;
    min-height:100vh;

    display:flex;
    justify-content:center;
    align-items:center;

    background:linear-gradient(
        135deg,
        #ff8a65,
        #d4ef4a,
        #7fe87f,
        #87ceeb,
        #8a8cff,
        #ff9ed6
    );
}

#container{
    width:90%;
    max-width:700px;
    text-align:center;
}

h1{
    font-size:4rem;
    margin-bottom:40px;
    text-shadow:0 4px 8px rgba(0,0,0,.3);
}

#instruction{
    font-size:1.5rem;
    font-weight:bold;
    margin-bottom:30px;
}

.green{
    color:#ffe600;
}

#reactionBox{
    width:320px;
    height:320px;
    margin:30px auto;
    background:#e74c3c;
    border-radius:20px;
    display:none;
    cursor:pointer;
}

button{
    border:none;
    padding:15px 35px;
    font-size:1.8rem;
    border-radius:12px;
    cursor:pointer;
    background:#2ecc71;
    color:black;
}

#restartButton{
    display:none;
}

#results{
    display:none;
}

#results h2{
    margin:25px 0;
    font-size:2.5rem;
    font-weight:normal;
}

#rating{
    font-size:2rem;
    font-weight:bold;
    margin-top:20px;
}

#status{
    margin-top:15px;
    font-size:1.3rem;
    font-weight:bold;
}

@media(max-width:600px){

    h1{
        font-size:2.5rem;
    }

    #instruction{
        font-size:1.1rem;
    }

    #reactionBox{
        width:250px;
        height:250px;
    }

    #results h2{
        font-size:1.8rem;
    }

    button{
        font-size:1.2rem;
    }
}

</style>
</head>

<body>

<div id="container">

    <h1>Reaction Time Game</h1>

    <p id="instruction">
        Click the space bar or tap the box when it turns
        <span class="green">green!</span>
    </p>

    <button id="startButton">Start Game</button>

    <div id="reactionBox"></div>

    <div id="status"></div>

    <div id="results">

        <h2>
            Best Time:
            <span id="bestTime">0</span> ms
        </h2>

        <h2>
            Your Time:
            <span id="reactionTime">0</span> ms
        </h2>

        <div id="rating"></div>

    </div>

    <br>

    <button id="restartButton">Try Again</button>

</div>

<script>

const startButton = document.getElementById("startButton");
const restartButton = document.getElementById("restartButton");
const reactionBox = document.getElementById("reactionBox");

const bestTimeDisplay = document.getElementById("bestTime");
const reactionTimeDisplay = document.getElementById("reactionTime");
const ratingDisplay = document.getElementById("rating");
const statusDisplay = document.getElementById("status");
const results = document.getElementById("results");

let bestTime = 0;
let gameStarted = false;
let canReact = false;
let startTime;
let timeout;

function startGame(){

    if(gameStarted) return;

    gameStarted = true;
    canReact = false;

    startButton.style.display = "none";
    restartButton.style.display = "none";

    results.style.display = "none";

    reactionBox.style.display = "block";
    reactionBox.style.backgroundColor = "#e74c3c";

    statusDisplay.textContent = "Wait for GREEN...";

    timeout = setTimeout(() => {

        reactionBox.style.backgroundColor = "#2ecc71";

        canReact = true;

        startTime = Date.now();

        statusDisplay.textContent = "GO!";

    }, Math.random()*4000 + 2000);
}

function finishGame(){

    if(!gameStarted || !canReact) return;

    const reactionTime = Date.now() - startTime;

    reactionTimeDisplay.textContent = reactionTime;

    if(bestTime === 0 || reactionTime < bestTime){
        bestTime = reactionTime;
    }

    bestTimeDisplay.textContent = bestTime;

    if(reactionTime < 200){
        ratingDisplay.textContent = "🔥 Amazing Reflexes!";
    }
    else if(reactionTime < 300){
        ratingDisplay.textContent = "⚡ Great!";
    }
    else if(reactionTime < 500){
        ratingDisplay.textContent = "👍 Good!";
    }
    else{
        ratingDisplay.textContent = "🐢 Keep Practicing!";
    }

    if(navigator.vibrate){
        navigator.vibrate(100);
    }

    reactionBox.style.display = "none";
    statusDisplay.textContent = "";

    results.style.display = "block";

    restartButton.style.display = "inline-block";

    gameStarted = false;
}

function restartGame(){

    clearTimeout(timeout);

    canReact = false;
    gameStarted = false;

    statusDisplay.textContent = "";

    results.style.display = "none";

    reactionBox.style.display = "none";

    startButton.style.display = "inline-block";

    restartButton.style.display = "none";
}

reactionBox.addEventListener("click", finishGame);

document.addEventListener("keydown", function(event){

    if(event.code === "Space"){

        event.preventDefault();

        finishGame();
    }
});

startButton.addEventListener("click", startGame);
restartButton.addEventListener("click", restartGame);

</script>

</body>
</html>
