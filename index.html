<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reaction Time Game</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Segoe UI',sans-serif;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    padding:20px;
    background:linear-gradient(
        135deg,
        #ff6b6b,
        #ffd93d,
        #6bff95,
        #6bcfff,
        #8c6bff
    );
}

#gameContainer{
    width:100%;
    max-width:500px;
    background:white;
    padding:30px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 30px rgba(0,0,0,.2);
}

h1{
    color:#222;
    margin-bottom:15px;
}

.instruction{
    margin-bottom:20px;
    line-height:1.6;
    font-size:1rem;
}

.highlight{
    color:#2ecc71;
    font-weight:bold;
}

#reactionBox{
    width:min(80vw,350px);
    height:min(80vw,350px);
    margin:20px auto;
    background:#3498db;
    border-radius:20px;
    display:none;
    cursor:pointer;
    transition:0.2s;
}

button{
    border:none;
    padding:14px 30px;
    border-radius:12px;
    font-size:1rem;
    font-weight:bold;
    cursor:pointer;
    background:#2ecc71;
    color:white;
    transition:.3s;
}

button:hover{
    transform:scale(1.05);
}

#restartButton{
    display:none;
}

.score-card{
    margin-top:15px;
    background:#f5f5f5;
    padding:15px;
    border-radius:12px;
}

.score-card h3{
    margin-bottom:10px;
}

.score-card span{
    font-size:2rem;
    font-weight:bold;
}

#rating{
    margin-top:20px;
    font-size:1.2rem;
    font-weight:bold;
}

#status{
    margin-top:10px;
    font-size:1rem;
    font-weight:bold;
    color:#666;
}

@media(max-width:500px){

    h1{
        font-size:1.8rem;
    }

    .score-card span{
        font-size:1.5rem;
    }
}
</style>
</head>

<body>

<div id="gameContainer">

    <h1>⚡ Reaction Time Game</h1>

    <p class="instruction">
        Wait until the box turns
        <span class="highlight">GREEN</span>
        then click the box, tap the box, or press the
        <strong>SPACEBAR</strong> as fast as possible!
    </p>

    <button id="startButton">Start Game</button>

    <div id="reactionBox"></div>

    <div class="score-card">
        <h3>🏆 Best Time</h3>
        <span id="bestTime">0</span> ms
    </div>

    <div class="score-card">
        <h3>⏱ Your Time</h3>
        <span id="reactionTime">0</span> ms
    </div>

    <div id="rating"></div>
    <div id="status"></div>

    <br>

    <button id="restartButton">Play Again</button>

</div>

<script>

const startButton = document.getElementById("startButton");
const restartButton = document.getElementById("restartButton");
const reactionBox = document.getElementById("reactionBox");

const bestTimeDisplay = document.getElementById("bestTime");
const reactionTimeDisplay = document.getElementById("reactionTime");
const ratingDisplay = document.getElementById("rating");
const statusDisplay = document.getElementById("status");

let gameStarted = false;
let canReact = false;
let startTime;
let timeout;

let bestTime = localStorage.getItem("bestTime") || 0;
bestTimeDisplay.textContent = bestTime;

function startGame(){

    if(gameStarted) return;

    gameStarted = true;
    canReact = false;

    startButton.style.display = "none";

    reactionBox.style.display = "block";
    reactionBox.style.backgroundColor = "#e74c3c";

    reactionTimeDisplay.textContent = "0";
    ratingDisplay.textContent = "";
    statusDisplay.textContent = "⏳ Wait for GREEN...";

    timeout = setTimeout(() => {

        reactionBox.style.backgroundColor = "#2ecc71";

        startTime = Date.now();

        canReact = true;

        statusDisplay.textContent = "🟢 GO!";

    }, Math.random() * 4000 + 2000);
}

function handleReaction(){

    if(!gameStarted || !canReact) return;

    const reactionTime = Date.now() - startTime;

    reactionTimeDisplay.textContent = reactionTime;

    statusDisplay.textContent = "";

    if(navigator.vibrate){
        navigator.vibrate(100);
    }

    if(bestTime == 0 || reactionTime < bestTime){

        bestTime = reactionTime;

        bestTimeDisplay.textContent = bestTime;

        localStorage.setItem("bestTime", bestTime);
    }

    if(reactionTime < 200){
        ratingDisplay.textContent = "🔥 Amazing Reflexes!";
    }
    else if(reactionTime < 300){
        ratingDisplay.textContent = "⚡ Great!";
    }
    else if(reactionTime < 500){
        ratingDisplay.textContent = "👍 Good!";
    }
    else{
        ratingDisplay.textContent = "🐢 Keep Practicing!";
    }

    reactionBox.style.display = "none";
    restartButton.style.display = "inline-block";

    gameStarted = false;
}

function restartGame(){

    clearTimeout(timeout);

    gameStarted = false;
    canReact = false;

    reactionBox.style.display = "none";
    reactionBox.style.backgroundColor = "#3498db";

    reactionTimeDisplay.textContent = "0";
    ratingDisplay.textContent = "";
    statusDisplay.textContent = "";

    restartButton.style.display = "none";
    startButton.style.display = "inline-block";
}

reactionBox.addEventListener("click", handleReaction);

document.addEventListener("keydown", function(event){

    if(event.code === "Space"){

        event.preventDefault();

        handleReaction();
    }
});

startButton.addEventListener("click", startGame);
restartButton.addEventListener("click", restartGame);

</script>

</body>
</html>
